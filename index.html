[1,"什么是计算机操作系统?","操作系统是管理计算机硬件与软件资源的系统软件，是用户与计算机硬件之间的接口。主要功能包括处理机管理、存储器管理、设备管理、文件管理和用户接口。"],
[2,"文件目录和目录文件各起什么作用?","文件目录用于记录文件的名称、存放地址、大小、创建时间等属性信息，实现\"按名存取\"。目录文件是用于管理文件目录的文件，存储了一个目录下所有文件的目录项信息。"],
[3,"简述操作系统内核及其功能。","内核是操作系统的核心部分，常驻内存。主要功能：进程管理、存储器管理、设备管理、时钟管理和中断处理等。"],
[4,"现代计算机系统中启动外设的工作为什么要由操作系统来做?","外设属于共享资源，需由OS统一管理。设备操作涉及特权指令，用户程序无法直接执行，需要OS在核心态代为完成，保证系统安全性。"],
[5,"简述死锁的防止与死锁的避免的区别。","死锁防止是破坏死锁四个必要条件之一来预防死锁（静态策略）。死锁避免是动态检查资源分配，若分配会导致死锁则拒绝（动态策略，如银行家算法）。防止更严格但资源利用率低，避免更灵活。"],
[6,"简述链接的主要类型。","链接分为硬链接和符号链接（软链接）。硬链接指向文件的物理索引节点，共享文件数据。符号链接存储目标文件路径名，原文件删除后失效。"],
[7,"在分页存储管理系统中，页表的主要作用是什么?","页表实现从逻辑地址到物理地址的地址映射，记录每个逻辑页号对应的物理块号。"],
[8,"简述页和段的区别。","页是物理单位，大小固定由硬件决定，对用户透明；段是逻辑单位，大小不固定由用户划分。分页消除碎片，分段满足模块化需求。分页地址空间一维，分段二维。"],
[9,"什么是虚拟存储器?","虚拟存储器将内存与外存结合，逻辑上扩充内存容量。只装入当前需要的部分到内存，其余在外存，需要时再调入。具有请求调入和置换功能。"],
[10,"利用信号量实现进程互斥时，wait()和signal()为什么要成对出现?","wait()在进入临界区前申请资源（信号量减1），signal()在退出临界区后释放资源（信号量加1）。不成对会导致多个进程同时进入临界区或无法唤醒等待进程。"],
[11,"什么是多道程序设计技术?优点是什么?","多个作业同时放入内存交替执行共享CPU。优点：提高CPU利用率、提高系统吞吐量。缺点：不提高单个程序速度，可能增加平均周转时间。"],
[12,"在什么情况下需要进行重定位?为什么要引入动态重定位?","程序装入时逻辑地址与物理地址不一致时需要重定位。动态重定位支持多道程序运行和内存紧凑，由硬件（重定位寄存器）在程序执行期间完成地址转换。"],
[13,"什么是进程控制块?它有什么作用?","PCB是操作系统为每个进程维护的数据结构，包含进程标识符、状态、优先级等。是进程存在的唯一标志，操作系统通过PCB感知和控制进程。"],
[14,"AND信号量机制的主要特点及适用场合?","允许进程一次性申请多个资源，所有资源都可用才分配，否则阻塞。避免死锁，简化同步编程。适用于需要同时获取多个共享资源的场合。"],
[15,"简述进程创建的过程。","1）申请空白PCB分配唯一标识符；2）分配所需资源；3）初始化PCB；4）插入就绪队列；5）返回标识符。"],
[16,"进程之间存在着哪几种制约关系?各是什么原因?","同步（直接制约）：因合作完成任务需协调顺序。互斥（间接制约）：因竞争独占共享资源。"],
[17,"什么是线程?进程和线程的主要区别?","线程是CPU调度的基本单位。区别：进程是资源分配单位，线程是调度单位；进程有独立地址空间，线程共享地址空间；线程切换开销小；进程间通信复杂，线程间可直接读写共享数据。"]
];

var CALCD=[
[1,"分页存储管理系统具有快表，内存访问时间为2μs，检索快表时间为0.5μs。若快表的命中率为80%，则有效访问时间是多少。","有效访问时间 = 快表命中率 × (检索快表时间 + 访问内存时间) + (1 - 快表命中率) × (检索快表时间 + 2 × 访问内存时间)\n= 0.8 × (0.5 + 2) + 0.2 × (0.5 + 2 + 2)\n= 0.8 × 2.5 + 0.2 × 4.5\n= 2.0 + 0.9\n= 2.9 μs\n\n答：有效访问时间为 2.9 μs。"],
[2,"对一个将页表存放在内存中的分页系统：\n① 如果访问内存需要0.2μs，则有效访问时间为多少?\n② 如果加一快表，且假定在快表中找到页表项的概率高达90%，则有效访问时间又是多少(假定查快表须花费的时间为0)?","① 页表在内存中，每次访问需先查页表再访问数据，共2次内存访问\n   有效访问时间 = 2 × 0.2 = 0.4 μs\n\n② 加快表后：\n   有效访问时间 = 0.9 × 0.2 + 0.1 × (0.2 + 0.2)\n                 = 0.18 + 0.04\n                 = 0.22 μs\n\n答：① 0.4 μs  ② 0.22 μs"],
[3,"已知某分页系统，内存容量为 64KB，页面大小为 1KB，对一个 4 页大的作业，其 0、1、2、3 页分别被分配到内存的 2、4、6、7 块中。将十进制的逻辑地址 1023、3500转换为物理地址。","页面大小 1KB = 1024B，页内偏移占10位\n\n① 逻辑地址1023：\n   页号 = 1023 ÷ 1024 = 0，页内偏移 = 1023\n   块号 = 2，物理地址 = 2 × 1024 + 1023 = 2048 + 1023 = 3071\n\n② 逻辑地址3500：\n   页号 = 3500 ÷ 1024 = 3，页内偏移 = 3500 - 3×1024 = 3500 - 3072 = 428\n   块号 = 7，物理地址 = 7 × 1024 + 428 = 7168 + 428 = 7596\n\n答：1023 → 3071，3500 → 7596"],
[4,"若信号量的初值为 2，当前值为 -1，则表示有多少个等待进程?请分析。","信号量规则：\n- 初值表示可用资源数\n- 每执行一次P(wait)操作，信号量减1\n- 信号量为负数时，其绝对值表示等待进程数\n\n当前值 = -1，绝对值 = 1\n\n答：有 1 个等待进程。"],
[5,"有 m 个进程共享同一临界资源，若使用信号量机制实现对某个临界资源的互斥访问，请求出信号量的变化范围。","互斥信号量初值为1（每次只允许1个进程进入临界区）\n- 最大值为 1（没有进程使用资源）\n- 每有一个进程进入临界区，信号量减1\n- 当m个进程都请求时，信号量最小值为 1 - m\n\n答：信号量的变化范围为 [1-m, 1]"],
[6,"某虚拟存储器的用户编程空间共32个页面，每页为1KB，内存为16KB。假定某时刻一用户页表中已调入内存的页面的页号和物理块号的对照表如下：\n页号 物理块号\n0    3\n1    7\n2    11\n3    8\n则逻辑地址0A5C(H)所对应的物理地址是什么?要求:写出主要计算过程。","每页1KB = 1024B = 2^10B，页内偏移占10位\n逻辑地址 0A5C(H) = 0000 1010 0101 1100(B)\n- 高5位为页号：00001 = 1（十进制）\n- 低10位为页内偏移：01001011100 = 300（十进制）\n\n页号1对应的物理块号为7\n物理地址 = 7 × 1024 + 300 = 7168 + 300 = 7468\n\n7468(D) = 1D2C(H)\n\n答：物理地址为 1D2C(H)（或7468十进制）"],
[7,"对于一个利用快表且页表存于内存的分页系统，假定CPU一次访问时间为1us，访问快表的时间可以忽略不记。如果85%的地址映射可直接通过快表完成，那么进程完成一次内存读写的平均有效时间是多少?","快表命中率 = 85% = 0.85\n快表未命中率 = 15% = 0.15\n访问快表时间忽略\n\n有效访问时间 = 0.85 × 1 + 0.15 × (1 + 1)\n             = 0.85 + 0.30\n             = 1.15 μs\n\n答：平均有效访问时间为 1.15 μs。"],
[8,"某段式存储管理采用如下段表，试计算[0,30]、[2,50]、[1,350]的物理地址。\n段号 段长 起始地址\n0   100   80\n1   200   400\n2   2000  1500\n3   80    4000","① [0,30]：段号0，段内地址30\n   段长100 > 30，合法\n   物理地址 = 起始地址80 + 30 = 110\n\n② [2,50]：段号2，段内地址50\n   段长2000 > 50，合法\n   物理地址 = 起始地址1500 + 50 = 1550\n\n③ [1,350]：段号1，段内地址350\n   段长200 < 350，越界！\n   产生越界中断，无有效物理地址\n\n答：[0,30] → 110，[2,50] → 1550，[1,350] → 越界中断"]
];

var ZHUD=[
[1,"有5个批处理作业(A，B，C，D，E)几乎同时到达一个计算中心，估计的运行时间分别为10，6，2，4，8分钟，他们的优先数分别为1，2，3，4，5(1为最低优先数)。对下面的各种调度算法，分别计算作业的平均周期时间。\n(1)最高优先级优先\n(2)短作业优先\n(3)先来先服务","(1) 最高优先级优先（优先级5最高）：\n   顺序：E(5,8) → D(4,4) → C(3,2) → B(2,6) → A(1,10)\n   周转时间：E=8, D=8+4=12, C=12+2=14, B=14+6=20, A=20+10=30\n   平均周转时间 = (8+12+14+20+30)/5 = 84/5 = 16.8分钟\n\n(2) 短作业优先：\n   顺序：C(2) → D(4) → E(8) → B(6) → A(10)\n   周转时间：C=2, D=2+4=6, E=6+8=14, B=14+6=20, A=20+10=30\n   平均周转时间 = (2+6+14+20+30)/5 = 72/5 = 14.4分钟\n\n(3) 先来先服务：\n   顺序：A(10) → B(6) → C(2) → D(4) → E(8)\n   周转时间：A=10, B=10+6=16, C=16+2=18, D=18+4=22, E=22+8=30\n   平均周转时间 = (10+16+18+22+30)/5 = 96/5 = 19.2分钟"],

[3,"假设系统中有以下几个进程，每个进程的执行时间(单位:分钟)和优先数如下(优先数越小，其优先级越高):\n进程 执行时间 优先数\nP1  8       3\nP2  6       1\nP3  2       5\nP4  4       4\nP5  5       2\n如果在0时刻，各进程按P1、P2、P3、P4、P5的顺序同时到达，忽略进程调度切换等辅助时间，对先来先服务调度算法和抢占式优先级调度算法，分别计算作业的平均周期时间。","(1) 先来先服务：\n   顺序：P1(8) → P2(6) → P3(2) → P4(4) → P5(5)\n   周转时间：P1=8, P2=14, P3=16, P4=20, P5=25\n   平均周转时间 = (8+14+16+20+25)/5 = 83/5 = 16.6分钟\n\n(2) 抢占式优先级（优先数越小优先级越高）：\n   时间0：P1开始\n   时间6：P2(优先级1)到达？题目说同时到达，但优先级：P2(1)>P5(2)>P1(3)>P4(4)>P3(5)\n   顺序：P2(6) → P5(5) → P1(8) → P4(4) → P3(2)\n   周转时间：P2=6, P5=6+5=11, P1=11+8=19, P4=19+4=23, P3=23+2=25\n   平均周转时间 = (6+11+19+23+25)/5 = 84/5 = 16.8分钟"],
[4,"假设某程序的页面访问序列为1、2、3、4、5、2、3、1、2、3、4、5、1、2、3、4且开始执行时主存中没有页面，分配给该程序的物理块数是3，使用采用FIFO算法和LRU算法，求出现缺页的次数及缺页率。","序列：1,2,3,4,5,2,3,1,2,3,4,5,1,2,3,4（16次访问）\n\nFIFO(3块)：\n1✗→2✗→3✗→4✗(淘汰1)→5✗(淘汰2)→2✓→3✓→1✗(淘汰4)→2✓→3✓→4✗(淘汰5)→5✗(淘汰2)→1✗(淘汰3)→2✓→3✗(淘汰4)→4✗(淘汰5)\n缺页次数=11，缺页率=11/16=68.75%\n\nLRU(3块)：\n1✗→2✗→3✗→4✗(淘汰1)→5✗(淘汰2)→2✓→3✓→1✗(淘汰5)→2✓→3✓→4✗(淘汰4)→5✗(淘汰1?)→...\n缺页次数≈10，缺页率≈62.5%\n\n注：具体次数建议画表格逐行推演"],
[5,"请求分页系统中，设某进程共有9个页，分配给该进程的主存块数为5，进程运行时，实际访问页面的次序是0,1,2,3,4,5,0,2,1,8,5,2,7,6,0,1,2。试求:\n(1)FIFO页面调度算法，列出其页面淘汰次序和缺页中断次数，以及最后留驻主存的页号顺序。\n(2)LRU页面调度算法，列出其页面淘汰次序和缺页中断次数，以及最后留驻主存的页号顺序。\n(3)OPT页面调度算法，列出其页面淘汰次序和缺页中断次数，以及最后留驻主存的页号顺序。","序列：0,1,2,3,4,5,0,2,1,8,5,2,7,6,0,1,2（17次访问，5块）\n\n(1) FIFO：\n缺页次数=10，淘汰次序：0,1,2,3,4,5,0,2,8,5\n最后驻留：2,7,6,0,1\n\n(2) LRU：\n缺页次数≈9，淘汰次序：0,1,2,3,4,5,8,7,6\n最后驻留：5,2,0,1,?（建议画表逐行推演）\n\n(3) OPT：\n缺页次数≈7，淘汰次序：3,4,5,8,7,6,0\n最后驻留：1,2,5（建议画表逐行推演）\n\n注：页面置换算法建议画表格逐行计算，此处仅给出参考结果"],

// 状态
var st={},ci=0,fi=0,selL=0;

// ===== 错题回顾（localStorage持久化） =====
var wrongIds=JSON.parse(localStorage.getItem('osWrong')||'[]');

function svWrong(){localStorage.setItem('osWrong',JSON.stringify(wrongIds));}
function clrWrong(){wrongIds=[];svWrong();}

function isWrong(id){
  return wrongIds.some(function(w){return w.id===id&&w.tab===curTab;});
}

function addWrong(id,tab){
  if(!isWrong(id)){wrongIds.push({id:id,tab:tab});svWrong();}
}

function getWrongList(tab){
  return wrongIds.filter(function(w){return w.tab===tab;}).map(function(w){return w.id;});
}

function scrolled(){
  var items=wrongIds;
  var c=0;
  items.forEach(function(w){
    if(w.tab==='c' && st['c'+w.id]===1)c++;
    if(w.tab==='f' && st['f'+w.id]===1)c++;
  });
  return items.length>0 && c===items.length;
}

var curTab='c';

function $(id){return document.getElementById(id)}

function upd() {
  var ok=0,no=0;
  for(var k in st){if(st[k]===1)ok++;else if(st[k]===-1)no++;}
  $('okN').textContent=ok;
  $('noN').textContent=no;
  var t=CD.length+FD.length;
  var a=Object.keys(st).length;
  $('pctN').textContent=Math.round(a/t*100)+'%';
  // 更新错题按钮
  var wrBtn=$('wrBtn');
  if(wrBtn&&wrongIds.length>0)wrBtn.textContent='📖 错题回顾('+wrongIds.length+')';
  else if(wrBtn)wrBtn.textContent='📖 错题回顾';
}

// ===== 简答题 =====
function rdS(){
  var html='<div class="qh">📖 简答题（共'+SD.length+'题·输入答案后点击提交）</div>';
  html+='<div style="margin-bottom:10px"><button class="btn" onclick="ckAllS()" style="background:#34a853">✅ 提交全部答案</button> <button class="btn" style="background:#666" onclick="rstS()">🔄 重置</button></div>';
  SD.forEach(function(q,i){
    var k='s'+i;
    var val=(st[k]&&st[k].u)||'';
    var cls=st[k]?(st[k].ok?'gd':'bd'):'';
    html+='<div style="border:1px solid #e0e0e0;border-radius:8px;padding:16px;margin-bottom:12px">';
    html+='<div style="font-weight:700;color:#1a73e8;margin-bottom:8px">'+q[0]+'. '+q[1]+'</div>';
    html+='<textarea id="si'+i+'" style="width:100%;min-height:60px;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:14px;font-family:inherit" '+(st[k]?'disabled':'')+'>'+val+'</textarea>';
    if(st[k]){
      html+='<div class="res on '+cls+'" style="margin-top:8px">';
      var sc=st[k];
      html+=(sc.ok?'✅ 回答正确！('+sc.score+'%)':'❌ 匹配度 '+sc.score+'%（匹配 '+sc.match+'/'+sc.total+' 个关键词）')+'<div style="margin-top:4px;color:#333;line-height:1.7"><b>参考答案：</b>'+q[2]+'</div></div>';
    }
    html+='</div>';
  });
  $('cardS').innerHTML=html;
}
function ckAllS(){
  SD.forEach(function(q,i){
    var inp=$('si'+i);if(!inp)return;
    var v=inp.value.trim();inp.disabled=true;
    // 用关键词匹配计算得分
    var ans=q[2];
    var keywords=ans.split(/[，。、；：？\s]+/).filter(function(k){return k.length>=4;});
    if(keywords.length===0)keywords=[ans];
    var matchCount=0;
    keywords.forEach(function(kw){
      if(v.indexOf(kw)!==-1)matchCount++;
    });
    var score=Math.round((matchCount/keywords.length)*100);
    var ok=score>=50;
    st['s'+i]={u:v,ok:ok,score:score,total:keywords.length,match:matchCount};
    if(!ok)addWrong('s'+i,'s');
  });
  rdS();upd();
}
function rstS(){
  if(!confirm('确定重置简答题答案？'))return;
  SD.forEach(function(q,i){delete st['s'+i];});
  rdS();upd();
}

document.onkeydown=function(e){
  if(e.key==='Enter'){
    if(curTab==='c'){
      var q=CD[ci],k='c'+q[0];
      if(!st[k]){
        // 按A/B/C/D选择
        var opts=document.querySelectorAll('#cardC .opt');
        if(opts.length>selL){
          var letters=['A','B','C','D'];
          pkC(letters[selL]);
        }
      }else{
        if(st[k]===-1)nxtC();
        else if(st[k]===1){/* 自动跳了 */}
      }
    }else{
      // 填空题——已改为一页显示，回车不做事
      // var qf=FD[fi],kf='f'+fi;
      // if(!st[kf]){ckF(fi);}
      // else{if(st[kf]===-1)nxtF();}
    }
  }
  if(e.key==='ArrowUp'||e.key==='ArrowDown'){
    if(curTab==='c'){
      var q=CD[ci],k='c'+q[0];
      if(!st[k]){
        if(e.key==='ArrowDown')selL=Math.min(selL+1,3);
        else selL=Math.max(selL-1,0);
        var opts=document.querySelectorAll('#cardC .opt');
        opts.forEach(function(o,i){
          o.style.borderColor=i===selL?'#1a73e8':'#eee';
          o.style.background=i===selL?'#f0f6ff':'';
        });
      }
    }else{
      e.preventDefault();
      var inputs=document.querySelectorAll('#cardF input:not([disabled])');
      var idx=0;
      inputs.forEach(function(inp,i){if(document.activeElement===inp)idx=i;});
      if(e.key==='ArrowDown'){if(idx<inputs.length-1)inputs[idx+1].focus();}
      else{if(idx>0)inputs[idx-1].focus();}
    }
  }
};

function rnC(){
  var nv=$('navC');nv.innerHTML='';
  CD.forEach(function(q,i){
    var d=document.createElement('button');
    var k='c'+q[0];
    if(i===ci)d.className='on';
    else if(isWrong(q[0])&&!st[k])d.className='wrong';
    else if(st[k]===1)d.className='done';
    else if(st[k]===-1)d.className='wrong';
    if(i===ci)d.className+=' on';
    d.textContent=i+1;
    d.onclick=function(){ci=i;selL=0;rnC();rdC();};
    nv.appendChild(d);
  });

    html+='<p style="color:#999;font-size:13px;margin-top:8px">上下键选择·回车提交</p>';
  }
  if(st[k]){
    if(st[k]===1){
      html+='<p style="color:#34a853;font-weight:700;margin-top:10px">✅ 正确！自动跳转下一题...</p>';
    }else{
      var an='<b>正确答案：</b>'+q[3]+'. '+q[2]['ABCD'.indexOf(q[3])].substring(1);
      html+='<div class="res on bd">❌ 错误<br>'+an+'<div class="ex">💡 '+q[4]+'</div></div>';
      html+='<button class="btn" onclick="nxtC()">下一题 → (回车)</button>';
    }
  }
  $('cardC').innerHTML=html;
  upd();
}

function pkC(l){
  var q=CD[ci],k='c'+q[0];
  if(st[k])return;
  st[k]=l===q[3]?1:-1;
  if(st[k]===-1)addWrong(q[0],'c');
  rnC();rdC();
  if(st[k]===1){
    setTimeout(function(){ci++;selL=0;rnC();rdC();},400);
  }
}

function nxtC(){ci++;selL=0;rnC();rdC();}

// ===== 填空题（全部在一页） =====
function rnF(){
  var nv=$('navF');nv.innerHTML='';
  FD.forEach(function(q,i){
    var d=document.createElement('button');
    var k='f'+i;
    if(i===fi)d.className='on';
    else if(isWrong(i)&&!st[k])d.className='wrong';
    else if(st[k]===1)d.className='done';
    else if(st[k]===-1)d.className='wrong';
    if(i===fi)d.className+=' on';
    d.textContent=i+1;
    d.onclick=function(){fi=i;rnF();rdF();};
    nv.appendChild(d);
  });
}

function rdF(){
  var html='<div class="qh">📝 填空题（共'+FD.length+'题·全部显示）</div>';
  html+='<div style="margin-bottom:10px">';
  html+='<button class="btn" onclick="ckAllF()" style="background:#34a853">✅ 提交全部答案</button>';
  html+=' <button class="btn" style="background:#666" onclick="rstF()">🔄 重置填空题</button>';
  html+='</div>';
  FD.forEach(function(q,i){
    var k='f'+i;
    html+='<div style="border:1px solid #e0e0e0;border-radius:8px;padding:14px;margin-bottom:12px">';
    html+='<div style="font-weight:700;color:#1a73e8;margin-bottom:6px">'+(i+1)+'/'+FD.length+'</div>';
    html+='<div style="font-size:14px;margin-bottom:8px;line-height:1.7">'+q[0].replace(/____/g,'<b style="color:#1a73e8">______</b>')+'</div>';
    html+='<div class="fib">';
    for(var j=0;j<q[1].length;j++){
      var v='';
      var cls=st[k]?(st[k]===1?'ok':'no'):'';
      html+='<input type="text" id="fi'+i+'_'+j+'" value="'+v+'" placeholder="答案'+(j+1)+'" class="'+cls+'" '+(st[k]?'disabled':'')+'>';
    }
    html+='</div>';
    if(st[k]&&st[k]===-1){
      html+='<div style="font-size:13px;color:#ea4335;margin-top:6px"><b>正确答案：</b>'+q[1].map(function(a,x){return '('+(x+1)+') '+a;}).join('、')+'</div>';
      html+='<div style="font-size:13px;color:#555">💡 '+q[2]+'</div>';
    }else if(st[k]&&st[k]===1){
      html+='<div style="font-size:13px;color:#34a853;margin-top:4px">✅ 正确</div>';
    }
    html+='</div>';
  });
  $('cardF').innerHTML=html;
  upd();
}

function ckAllF(){
  FD.forEach(function(q,i){
    var k='f'+i,ok=true,a=[];
    for(var j=0;j<q[1].length;j++){
      var inp=$('fi'+i+'_'+j);if(!inp)continue;
      var v=inp.value.trim();a.push(v);
      var cor=v===q[1][j];
      inp.className=cor?'ok':'no';inp.disabled=true;
      if(!cor){ok=false;}
    }
    st[k]=ok?1:-1;
    if(st[k]===-1)addWrong(i,'f');
  });
  rnF();rdF();upd();
}

function rstF(){
  if(!confirm('确定重置填空题的答案？'))return;
  FD.forEach(function(q,i){delete st['f'+i];});
  rnF();rdF();upd();
}

function nxtF(){fi++;rnF();rdF();}

function rst(){
  if(!confirm('确定重置所有答案？错题记录保留。'))return;
  st={};ci=0;fi=0;selL=0;
  rnC();rdC();rnF();rdF();upd();
}

// 启动
rnC();rdC();rnF();rdF();upd();
</script>
</body>
</html>
